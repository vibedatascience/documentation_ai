 "pop": 11947, "region": "East Asia & Pacific", "rank": 216, "share": 0.0001}, {"name": "Tuvalu", "iso": "TUV", "pop": 9646, "region": "East Asia & Pacific", "rank": 217, "share": 0.0001}];
const total = d3.sum(items, d=>d.pop);

const REGIONCOLORS = {
  "South Asia":"#ee8b33",
  "East Asia & Pacific":"#c9484f",
  "Sub-Saharan Africa":"#5aa054",
  "Europe & Central Asia":"#4e88bd",
  "Latin America & Caribbean":"#9d7bc7",
  "Middle East, North Africa, Afghanistan & Pakistan":"#e5c88f",
  "Middle East & North Africa":"#e5c88f",
  "North America":"#5fc9c4"
};
function regionColor(r){ return REGIONCOLORS[r] || "#8f8f8f"; }
function shortRegion(r){
  return r.replace("Middle East, North Africa, Afghanistan & Pakistan","MENA+")
          .replace("Middle East & North Africa","MENA")
          .replace("Latin America & Caribbean","Latin America & Carib.");
}

const PALETTE = ["#4e88bd","#e5c88f","#ee8b33","#b05454","#5aa054","#dd9aa2","#c9484f","#a86aa4",
"#9d7bc7","#dda6d8","#8a5d52","#a3c4dd","#e07ec0","#ccdaee","#8f8f8f","#eb9a4d","#bdc94e","#ecd3a0",
"#5fc9c4","#8fd694","#7b8fc7","#8b7bc7","#a7c46a","#d6a0dd","#7ba4c7","#c7b57b","#94b8dd","#7b8f5d"];
const flatColor = {};
items.forEach((d,i)=>flatColor[d.iso]=PALETTE[i%PALETTE.length]);

const W = 1400, H = 930;
let mode = "regioncolor";

function computeLayout(grouped){
  let hier;
  if (grouped){
    hier = d3.hierarchy({
      name:"root",
      children: Array.from(d3.group(items,d=>d.region),([reg,cs])=>({name:reg, children:cs}))
    }).sum(d=>d.pop||0).sort((a,b)=>b.value-a.value);
    d3.treemap().size([W,H]).paddingInner(1.5).paddingOuter(2).paddingTop(2)(hier);
  } else {
    hier = d3.hierarchy({name:"root", children: items})
      .sum(d=>d.pop||0).sort((a,b)=>b.value-a.value);
    d3.treemap().size([W,H]).paddingInner(1.5).paddingOuter(2)(hier);
  }
  return hier;
}

const layoutFlat = computeLayout(false);
const layoutGrouped = computeLayout(true);
const posFlat = {}, posGrouped = {};
layoutFlat.leaves().forEach(d=>posFlat[d.data.iso]=d);
layoutGrouped.leaves().forEach(d=>posGrouped[d.data.iso]=d);

const stage = document.getElementById("stage");
const svg = d3.select("#svg").attr("viewBox",`0 0 ${W} ${H}`);
const g = svg.append("g");
const tt = document.getElementById("tt");
const zlevel = document.getElementById("zlevel");

function fmtPop(p){
  if (p>=1e9) return (p/1e9).toFixed(2)+"B";
  if (p>=1e6) return (p/1e6).toFixed(1)+"M";
  if (p>=1e3) return Math.round(p/1e3)+"K";
  return p;
}

const leafG = g.selectAll("g.leaf").data(items, d=>d.iso).join("g")
  .attr("class","leaf")
  .on("mousemove",(ev,s)=>{
    tt.style.display="block";
    tt.style.left=Math.min(ev.clientX+14, window.innerWidth-340)+"px";
    tt.style.top=(ev.clientY+14)+"px";
    tt.innerHTML = `<b>${s.name}</b><br>`
      + `<span class="k">population</span> ${s.pop.toLocaleString()}<br>`
      + `<span class="k">share of world</span> ${s.share.toFixed(3)}%<br>`
      + `<span class="k">rank</span> ${s.rank} of ${items.length}<br>`
      + `<span class="k">region</span> ${s.region}<br>`
      + `<span class="k">source</span> World Bank, 2024`;
  })
  .on("mouseleave",()=>{ tt.style.display="none"; })
  .on("dblclick",(ev,s)=>{ ev.stopPropagation(); flyTo(nodeOf(s)); });

leafG.append("rect").attr("rx",2);
leafG.append("text").attr("class","t-name").text(d=>d.name);
leafG.append("text").attr("class","t-val").text(d=>fmtPop(d.pop));
leafG.append("text").attr("class","t-meta").text(d=>d.share.toFixed(3)+"% / rank "+d.rank);

const regionG = g.append("g");

function nodeOf(s){ return (mode==="grouped"?posGrouped:posFlat)[s.iso]; }

function tileColor(s){
  return mode==="flat" ? flatColor[s.iso] : regionColor(s.region);
}

let k = 1;
function updateLabels(){
  zlevel.textContent = "zoom "+k.toFixed(1)+"x";
  leafG.each(function(s){
    const d = nodeOf(s);
    const w=(d.x1-d.x0)*k, h=(d.y1-d.y0)*k;
    const sel=d3.select(this);
    const label=s.name;
    let px = Math.min(26, Math.max(11, Math.sqrt(w*h)/7));
    const fits = w > label.length*px*0.56+12 && h > px*1.7;
    if (!fits){ px = Math.max(9,(w-10)/(label.length*0.58)); }
    const show = px>=9 && h>px*1.7 && w>34;
    const fs = px/k;
    const pad = 7/k;
    sel.select(".t-name").style("display",show?null:"none")
      .attr("x",pad).attr("y",pad+fs*0.9)
      .style("font-size",fs+"px")
      .style("font-weight", s.share>=1?"700":"500");
    const line2 = show && h > px*3.1;
    sel.select(".t-val").style("display",line2?null:"none")
      .attr("x",pad).attr("y",pad+fs*0.9+fs*1.2)
      .style("font-size",Math.max(8.5/k,fs*0.72)+"px");
    const line3 = line2 && h > px*4.6 && w > 150;
    sel.select(".t-meta").style("display",line3?null:"none")
      .attr("x",pad).attr("y",pad+fs*0.9+fs*2.25)
      .style("font-size",Math.max(8/k,fs*0.58)+"px");
  });
  leafG.select("rect").style("stroke-width",1.2/k).attr("rx",2/k);
  regionG.selectAll(".region-frame").style("stroke-width",2.5/k);
  regionG.selectAll(".region-label")
    .style("font-size",13/k+"px")
    .style("display", k<3.5 ? null : "none")
    .attr("x",d=>d.x0+8/k).attr("y",d=>d.y0+15/k);
}

function applyMode(next){
  mode = next;
  document.querySelectorAll("#modes button").forEach(b=>b.classList.toggle("on", b.dataset.mode===mode));

  const t = svg.transition().duration(700).ease(d3.easeCubicInOut);

  leafG.transition(t)
    .attr("transform", s=>{ const d=nodeOf(s); return `translate(${d.x0},${d.y0})`; });
  leafG.select("rect").transition(t)
    .attr("width", s=>{ const d=nodeOf(s); return Math.max(0,d.x1-d.x0); })
    .attr("height", s=>{ const d=nodeOf(s); return Math.max(0,d.y1-d.y0); })
    .attr("fill", tileColor);

  const regions = mode==="grouped" ? layoutGrouped.children : [];
  const rf = regionG.selectAll("g.rf").data(regions, d=>d.data.name);
  const rfE = rf.enter().append("g").attr("class","rf").style("opacity",0);
  rfE.append("rect").attr("class","region-frame");
  rfE.append("text").attr("class","region-label");
  const rfAll = rfE.merge(rf);
  rfAll.transition(t).style("opacity",1);
  rfAll.select(".region-frame")
    .attr("x",d=>d.x0).attr("y",d=>d.y0)
    .attr("width",d=>d.x1-d.x0).attr("height",d=>d.y1-d.y0);
  rfAll.select(".region-label")
    .text(d=>shortRegion(d.data.name).toUpperCase()+" "+(d.value/total*100).toFixed(1)+"%");
  rf.exit().transition(t).style("opacity",0).remove();

  const lg = d3.select("#legend").html("");
  if (mode!=="flat"){
    const seen = new Set();
    items.forEach(s=>{
      const key = regionColor(s.region)+"|"+shortRegion(s.region);
      if (seen.has(key)) return; seen.add(key);
      const e = lg.append("div").attr("class","lg");
      e.append("span").attr("class","sw").style("background",regionColor(s.region));
      e.append("span").text(shortRegion(s.region));
    });
  }
  t.on("end.labels", updateLabels);
  updateLabels();
}

const zoom = d3.zoom()
  .scaleExtent([0.8, 300])
  .on("start",()=>stage.classList.add("grabbing"))
  .on("end",()=>stage.classList.remove("grabbing"))
  .on("zoom",(ev)=>{
    g.attr("transform",ev.transform);
    k = ev.transform.k;
    updateLabels();
  });

svg.call(zoom).on("dblclick.zoom",null);

function flyTo(d){
  const w=d.x1-d.x0, h=d.y1-d.y0;
  const scale = Math.min(280, 0.85/Math.max(w/W, h/H));
  const tx = W/2 - scale*(d.x0+w/2);
  const ty = H/2 - scale*(d.y0+h/2);
  svg.transition().duration(750).ease(d3.easeCubicInOut)
    .call(zoom.transform, d3.zoomIdentity.translate(tx,ty).scale(scale));
}

document.getElementById("reset").onclick = ()=>{
  svg.transition().duration(600).ease(d3.easeCubicInOut)
    .call(zoom.transform, d3.zoomIdentity);
};

document.querySelectorAll("#modes button").forEach(b=>{
  b.onclick = ()=>applyMode(b.dataset.mode);
});

applyMode("regioncolor");
</script>
