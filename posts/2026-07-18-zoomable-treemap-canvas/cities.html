<style>
  :root { --ink:#14161c; --dim:#6b7280; --line:#e5e7eb; --cobalt:#2545FF; }
  * { box-sizing: border-box; }
  body { margin:0; background:#fff; color:var(--ink); font-family:"Space Grotesk",sans-serif; overflow:hidden; }
  #topbar { display:flex; align-items:center; gap:12px; padding:12px 20px 8px; flex-wrap:wrap; }
  #topbar h1 { font-size:19px; font-weight:700; margin:0; letter-spacing:-0.01em; }
  #topbar .sub { font-family:"IBM Plex Mono",monospace; font-size:11.5px; color:var(--dim); }
  .modegrp { display:flex; align-items:center; gap:6px; }
  .modegrp .lbl { font-family:"IBM Plex Mono",monospace; font-size:10.5px; color:var(--dim); }
  .modes { display:flex; border:1px solid var(--line); border-radius:6px; overflow:hidden; }
  .modes button {
    font-family:"IBM Plex Mono",monospace; font-size:11.5px; border:none; background:#fafafa;
    padding:6px 11px; cursor:pointer; color:var(--dim); border-right:1px solid var(--line);
  }
  .modes button:last-child { border-right:none; }
  .modes button.on { background:#2545FF; color:#fff; }
  #topbar .right { margin-left:auto; display:flex; align-items:center; gap:12px; }
  #topbar .zlevel { font-family:"IBM Plex Mono",monospace; font-size:12px; color:var(--dim); }
  #reset {
    font-family:"IBM Plex Mono",monospace; font-size:12px; border:1px solid var(--line);
    background:#fafafa; border-radius:5px; padding:5px 12px; cursor:pointer; color:var(--cobalt);
  }
  #reset:hover { background:#f0f2ff; }
  #legend { display:flex; gap:14px; flex-wrap:wrap; padding:0 20px 8px; font-family:"IBM Plex Mono",monospace; font-size:11px; }
  #legend .lg { display:flex; align-items:center; gap:5px; }
  #legend .sw { width:11px; height:11px; border-radius:2px; }
  #stage { width:100%; height:calc(100vh - 88px); min-height:460px; cursor:grab; }
  #stage.grabbing { cursor:grabbing; }
  svg { display:block; width:100%; height:100%; }
  .leaf rect { stroke:#fff; }
  .frame { fill:none; stroke:#fff; pointer-events:none; }
  text { pointer-events:none; fill:#14161c; }
  .t-name { font-family:"Space Grotesk",sans-serif; }
  .t-val, .t-meta { font-family:"IBM Plex Mono",monospace; }
  .t-val { opacity:0.78; } .t-meta { opacity:0.58; }
  .grp-label { font-family:"IBM Plex Mono",monospace; font-weight:600; opacity:0.85; }
  .tt {
    position:fixed; pointer-events:none; z-index:10; display:none;
    background:#14161c; color:#f3f4f6; padding:11px 14px; border-radius:8px;
    font-family:"IBM Plex Mono",monospace; font-size:12.5px; line-height:1.7;
    max-width:330px; box-shadow:0 8px 24px rgba(0,0,0,0.25);
  }
  .tt b { font-family:"Space Grotesk",sans-serif; font-size:15px; }
  .tt .k { color:#9ca3af; }
</style>
</head>
<body>
<div id="topbar">
  <h1>The 2,000 biggest cities on Earth</h1>
  <span class="sub">simplemaps world cities db &middot; metro population</span>
  <div class="modegrp"><span class="lbl">LAYOUT</span>
    <div class="modes" id="layoutModes">
      <button data-v="flat" class="on">flat</button>
      <button data-v="cont">continent</button>
      <button data-v="contcountry">continent &rsaquo; country</button>
    </div>
  </div>
  <div class="modegrp"><span class="lbl">COLOR</span>
    <div class="modes" id="colorModes">
      <button data-v="cont" class="on">continent</button>
      <button data-v="flat">flat</button>
    </div>
  </div>
  <div class="right">
    <span class="zlevel" id="zlevel">zoom 1.0x</span>
    <button id="reset">reset view</button>
  </div>
</div>
<div id="legend"></div>
<div id="stage"><svg id="svg"></svg></div>

const total = 3396021674;

const CONTCOLORS = {
  "Asia":"#c9484f","Africa":"#5aa054","Europe":"#4e88bd","North America":"#5fc9c4",
  "South America":"#9d7bc7","Oceania":"#ee8b33","Other":"#8f8f8f"
};
const PALETTE = ["#4e88bd","#e5c88f","#ee8b33","#b05454","#5aa054","#dd9aa2","#c9484f","#a86aa4",
"#9d7bc7","#dda6d8","#8a5d52","#a3c4dd","#e07ec0","#ccdaee","#8f8f8f","#eb9a4d","#bdc94e","#ecd3a0",
"#5fc9c4","#8fd694","#7b8fc7","#8b7bc7","#a7c46a","#d6a0dd","#7ba4c7","#c7b57b","#94b8dd","#7b8f5d"];

const W = 1400, H = 920;
let layoutMode = "flat", colorMode = "cont";

function computeLayout(mode){
  let rootData;
  if (mode==="flat"){
    rootData = {name:"root", children: items};
  } else if (mode==="cont"){
    rootData = {name:"root", children:
      Array.from(d3.group(items,d=>d.cont),([c,cs])=>({name:c, level:"cont", children:cs}))};
  } else {
    rootData = {name:"root", children:
      Array.from(d3.group(items,d=>d.cont),([c,byCont])=>({name:c, level:"cont", children:
        Array.from(d3.group(byCont,d=>d.country),([co,cs])=>({name:co, level:"country", children:cs}))
      }))};
  }
  const hier = d3.hierarchy(rootData).sum(d=>d.pop||0).sort((a,b)=>b.value-a.value);
  const tm = d3.treemap().size([W,H]).paddingInner(0.8);
  if (mode!=="flat") tm.paddingOuter(1.5).paddingTop(1.5);
  tm(hier);
  return hier;
}

const layouts = { flat: computeLayout("flat"), cont: computeLayout("cont"), contcountry: computeLayout("contcountry") };
const positions = {};
for (const m in layouts){
  positions[m] = {};
  layouts[m].leaves().forEach(d=>positions[m][d.data.rank]=d);
}
const frames = {};
for (const m in layouts){
  frames[m] = layouts[m].descendants().filter(d=>d.depth>0 && d.children)
    .map(d=>({name:d.data.name, level:d.data.level, x0:d.x0,y0:d.y0,x1:d.x1,y1:d.y1, share:d.value/total*100,
              id:(d.parent&&d.parent.data.name!=="root"?d.parent.data.name+"/":"")+d.data.name}));
}

const stage = document.getElementById("stage");
const svg = d3.select("#svg").attr("viewBox",`0 0 ${W} ${H}`);
const g = svg.append("g");
const frameG = g.append("g");
const tt = document.getElementById("tt");
const zlevel = document.getElementById("zlevel");

function fmtPop(p){
  if (p>=1e6) return (p/1e6).toFixed(p>=1e7?1:2)+"M";
  if (p>=1e3) return Math.round(p/1e3)+"K";
  return p;
}
function tileColor(s,i){
  return colorMode==="cont" ? CONTCOLORS[s.cont] : PALETTE[i%PALETTE.length];
}
function nodeOf(s){ return positions[layoutMode][s.rank]; }
function capLabel(c){
  if (c==="primary") return "national capital";
  if (c==="admin") return "admin capital";
  if (c==="minor") return "minor capital";
  return "";
}

const leafG = g.selectAll("g.leaf").data(items, d=>d.rank).join("g")
  .attr("class","leaf")
  .on("mousemove",(ev,s)=>{
    tt.style.display="block";
    tt.style.left=Math.min(ev.clientX+14, window.innerWidth-350)+"px";
    tt.style.top=(ev.clientY+14)+"px";
    const cap = capLabel(s.capital);
    tt.innerHTML = `<b>${s.name}</b><br>`
      + `<span class="k">country</span> ${s.country}${cap?` (${cap})`:``}<br>`
      + `<span class="k">metro population</span> ${s.pop.toLocaleString()}<br>`
      + `<span class="k">rank</span> ${s.rank} of 2000<br>`
      + `<span class="k">continent</span> ${s.cont}<br>`
      + `<span class="k">source</span> simplemaps world cities`;
  })
  .on("mouseleave",()=>{ tt.style.display="none"; })
  .on("dblclick",(ev,s)=>{ ev.stopPropagation(); flyTo(nodeOf(s)); });

leafG.append("rect").attr("rx",1.5);
leafG.append("text").attr("class","t-name").text(d=>d.name);
leafG.append("text").attr("class","t-val").text(d=>fmtPop(d.pop));
leafG.append("text").attr("class","t-meta").text(d=>d.country);

let k = 1;
let raf = null;
function updateLabels(){
  zlevel.textContent = "zoom "+k.toFixed(1)+"x";
  leafG.each(function(s){
    const d = nodeOf(s);
    const w=(d.x1-d.x0)*k, h=(d.y1-d.y0)*k;
    const sel=this;
    if (w<34 || h<16){
      sel.childNodes[1].style.display="none";
      sel.childNodes[2].style.display="none";
      sel.childNodes[3].style.display="none";
      return;
    }
    const label=s.name;
    let px = Math.min(24, Math.max(11, Math.sqrt(w*h)/7));
    if (w < label.length*px*0.56+10){ px = Math.max(8.5,(w-8)/(label.length*0.58)); }
    const show = px>=8.5 && h>px*1.6;
    const fs = px/k, pad = 6/k;
    const tn = sel.childNodes[1];
    tn.style.display = show?"":"none";
    if (show){
      tn.setAttribute("x",pad); tn.setAttribute("y",pad+fs*0.9);
      tn.style.fontSize=fs+"px";
      tn.style.fontWeight = s.share>=1?"700":"500";
    }
    const line2 = show && h > px*3.0;
    const tv = sel.childNodes[2];
    tv.style.display = line2?"":"none";
    if (line2){
      tv.setAttribute("x",pad); tv.setAttribute("y",pad+fs*0.9+fs*1.2);
      tv.style.fontSize=Math.max(8/k,fs*0.72)+"px";
    }
    const line3 = line2 && h > px*4.4 && w > 130;
    const tm = sel.childNodes[3];
    tm.style.display = line3?"":"none";
    if (line3){
      tm.setAttribute("x",pad); tm.setAttribute("y",pad+fs*0.9+fs*2.2);
      tm.style.fontSize=Math.max(7.5/k,fs*0.58)+"px";
    }
  });
  leafG.select("rect").style("stroke-width",0.9/k).attr("rx",1.5/k);

  frameG.selectAll("g.fr").each(function(f){
    const sel = d3.select(this);
    const isCont = f.level==="cont";
    const wOn = (f.x1-f.x0)*k, hOn = (f.y1-f.y0)*k;
    sel.select("rect").style("stroke-width",(isCont?2.5:1.4)/k);
    const showLbl = isCont ? k<3.5 : (k>=2 && k<25 && wOn>90 && hOn>40);
    const fs2 = (isCont?13:10.5)/k;
    sel.select("text")
      .style("display", showLbl?null:"none")
      .style("font-size",fs2+"px")
      .attr("x",f.x0+6/k).attr("y",f.y0+ (isCont?15:12)/k);
  });
}
function scheduleLabels(){
  if (raf) return;
  raf = requestAnimationFrame(()=>{ raf=null; updateLabels(); });
}

function applyLayout(){
  document.querySelectorAll("#layoutModes button").forEach(b=>b.classList.toggle("on",b.dataset.v===layoutMode));
  const t = svg.transition().duration(700).ease(d3.easeCubicInOut);
  leafG.transition(t).attr("transform", s=>{ const d=nodeOf(s); return `translate(${d.x0},${d.y0})`; });
  leafG.select("rect").transition(t)
    .attr("width", s=>{ const d=nodeOf(s); return Math.max(0,d.x1-d.x0); })
    .attr("height", s=>{ const d=nodeOf(s); return Math.max(0,d.y1-d.y0); });

  const fr = frameG.selectAll("g.fr").data(frames[layoutMode], f=>f.id);
  const frE = fr.enter().append("g").attr("class","fr").style("opacity",0);
  frE.append("rect").attr("class","frame");
  frE.append("text").attr("class","grp-label");
  const frAll = frE.merge(fr);
  frAll.transition(t).style("opacity",1);
  frAll.select("rect").transition(t)
    .attr("x",f=>f.x0).attr("y",f=>f.y0)
    .attr("width",f=>f.x1-f.x0).attr("height",f=>f.y1-f.y0);
  frAll.select("text")
    .text(f=>(f.level==="cont"?f.name.toUpperCase():f.name)+" "+f.share.toFixed(1)+"%");
  fr.exit().transition(t).style("opacity",0).remove();

  t.on("end.labels", updateLabels);
  updateLabels();
}

function applyColor(){
  document.querySelectorAll("#colorModes button").forEach(b=>b.classList.toggle("on",b.dataset.v===colorMode));
  leafG.select("rect").transition().duration(500).attr("fill",(s,i)=>tileColor(s,i));
  const lg = d3.select("#legend").html("");
  if (colorMode==="cont"){
    Object.entries(CONTCOLORS).forEach(([name,color])=>{
      if (name==="Other") return;
      const e = lg.append("div").attr("class","lg");
      e.append("span").attr("class","sw").style("background",color);
      e.append("span").text(name);
    });
  }
}

const zoom = d3.zoom()
  .scaleExtent([0.8, 200])
  .on("start",()=>stage.classList.add("grabbing"))
  .on("end",()=>stage.classList.remove("grabbing"))
  .on("zoom",(ev)=>{ g.attr("transform",ev.transform); k=ev.transform.k; scheduleLabels(); });
svg.call(zoom).on("dblclick.zoom",null);

function flyTo(d){
  const w=d.x1-d.x0, h=d.y1-d.y0;
  const scale = Math.min(180, 0.85/Math.max(w/W, h/H));
  const tx = W/2 - scale*(d.x0+w/2);
  const ty = H/2 - scale*(d.y0+h/2);
  svg.transition().duration(750).ease(d3.easeCubicInOut)
    .call(zoom.transform, d3.zoomIdentity.translate(tx,ty).scale(scale));
}
document.getElementById("reset").onclick = ()=>{
  svg.transition().duration(600).ease(d3.easeCubicInOut).call(zoom.transform, d3.zoomIdentity);
};
document.querySelectorAll("#layoutModes button").forEach(b=>b.onclick=()=>{layoutMode=b.dataset.v;applyLayout();});
document.querySelectorAll("#colorModes button").forEach(b=>b.onclick=()=>{colorMode=b.dataset.v;applyColor();});

applyColor();
applyLayout();
</script>
