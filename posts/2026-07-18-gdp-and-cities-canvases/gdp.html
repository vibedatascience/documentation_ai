<style>
  :root { --ink:#14161c; --dim:#6b7280; --line:#e5e7eb; --cobalt:#2545FF; }
  * { box-sizing: border-box; }
  body { margin:0; background:#fff; color:var(--ink); font-family:"Space Grotesk",sans-serif; overflow:hidden; }
  #topbar { display:flex; align-items:center; gap:12px; padding:12px 20px 8px; flex-wrap:wrap; }
  #topbar h1 { font-size:19px; font-weight:700; margin:0; letter-spacing:-0.01em; }
  #topbar .sub { font-family:"IBM Plex Mono",monospace; font-size:11.5px; color:var(--dim); }
  .modegrp { display:flex; align-items:center; gap:6px; }
  .modegrp .lbl { font-family:"IBM Plex Mono",monospace; font-size:10.5px; color:var(--dim); }
  .modes { display:flex; border:1px solid var(--line); border-radius:6px; overflow:hidden; }
  .modes button {
    font-family:"IBM Plex Mono",monospace; font-size:11.5px; border:none; background:#fafafa;
    padding:6px 11px; cursor:pointer; color:var(--dim); border-right:1px solid var(--line);
  }
  .modes button:last-child { border-right:none; }
  .modes button.on { background:#2545FF; color:#fff; }
  #topbar .right { margin-left:auto; display:flex; align-items:center; gap:12px; }
  #topbar .zlevel { font-family:"IBM Plex Mono",monospace; font-size:12px; color:var(--dim); }
  #reset {
    font-family:"IBM Plex Mono",monospace; font-size:12px; border:1px solid var(--line);
    background:#fafafa; border-radius:5px; padding:5px 12px; cursor:pointer; color:var(--cobalt);
  }
  #reset:hover { background:#f0f2ff; }
  #legend { display:flex; gap:14px; flex-wrap:wrap; align-items:center; padding:0 20px 8px; font-family:"IBM Plex Mono",monospace; font-size:11px; }
  #legend .lg { display:flex; align-items:center; gap:5px; }
  #legend .sw { width:11px; height:11px; border-radius:2px; }
  #legend .grad { width:160px; height:11px; border-radius:2px; }
  #stage { width:100%; height:calc(100vh - 88px); min-height:460px; cursor:grab; }
  #stage.grabbing { cursor:grabbing; }
  svg { display:block; width:100%; height:100%; }
  .leaf rect { stroke:#fff; }
  .region-frame { fill:none; stroke:#fff; pointer-events:none; }
  text { pointer-events:none; fill:#14161c; }
  .t-name { font-family:"Space Grotesk",sans-serif; }
  .t-val, .t-meta { font-family:"IBM Plex Mono",monospace; }
  .t-val { opacity:0.78; } .t-meta { opacity:0.58; }
  .region-label { font-family:"IBM Plex Mono",monospace; font-weight:600; opacity:0.85; }
  .tt {
    position:fixed; pointer-events:none; z-index:10; display:none;
    background:#14161c; color:#f3f4f6; padding:11px 14px; border-radius:8px;
    font-family:"IBM Plex Mono",monospace; font-size:12.5px; line-height:1.7;
    max-width:330px; box-shadow:0 8px 24px rgba(0,0,0,0.25);
  }
  .tt b { font-family:"Space Grotesk",sans-serif; font-size:15px; }
  .tt .k { color:#9ca3af; } .tt .yr { color:#fbbf24; }
</style>
</head>
<body>
<div id="topbar">

  <span class="sub">world bank, latest year per country &middot; 214 countries</span>
  <div class="modegrp"><span class="lbl">SIZE</span>
    <div class="modes" id="sizeModes">
      <button data-v="gdp" class="on">gdp</button>
      <button data-v="pop">population</button>
    </div>
  </div>
  <div class="modegrp"><span class="lbl">COLOR</span>
    <div class="modes" id="colorModes">
      <button data-v="pc" class="on">gdp per capita</button>
      <button data-v="region">region</button>
      <button data-v="flat">flat</button>
    </div>
  </div>
  <div class="modegrp"><span class="lbl">LAYOUT</span>
    <div class="modes" id="layoutModes">
      <button data-v="flat" class="on">flat</button>
      <button data-v="grouped">group by region</button>
    </div>
  </div>
  <div class="right">
    <span class="zlevel" id="zlevel">zoom 1.0x</span>
    <button id="reset">reset view</button>
  </div>
</div>
<div id="legend"></div>
<div id="stage"><svg id="svg"></svg></div>

          .replace("Latin America & Caribbean","Latin America & Carib.");

const pcExtent = d3.extent(items,d=>d.pc);

  .domain([Math.log10(pcExtent[0]), Math.log10(pcExtent[1])]);
function pcColor(d){ return pcScale(Math.log10(d.pc)); }

const W = 1400, H = 920;
let sizeMode = "gdp", colorMode = "pc", layoutMode = "flat";

function computeLayout(metric, grouped){
  let hier;
  const val = d=>d[metric]||0;
  if (grouped){
    hier = d3.hierarchy({name:"root",
      children: Array.from(d3.group(items,d=>d.region),([reg,cs])=>({name:reg, children:cs}))
    }).sum(val).sort((a,b)=>b.value-a.value);
    d3.treemap().size([W,H]).paddingInner(1.5).paddingOuter(2).paddingTop(2)(hier);
  } else {
    hier = d3.hierarchy({name:"root", children: items}).sum(val).sort((a,b)=>b.value-a.value);
    d3.treemap().size([W,H]).paddingInner(1.5).paddingOuter(2)(hier);
  }
  return hier;
}
const layouts = {
  "gdp|flat": computeLayout("gdp",false), "gdp|grouped": computeLayout("gdp",true),
  "pop|flat": computeLayout("pop",false), "pop|grouped": computeLayout("pop",true)
};

for (const key in layouts){
  positions[key] = {};
  layouts[key].leaves().forEach(d=>positions[key][d.data.iso]=d);
}

function fmtMoney(v){
  if (v>=1e12) return "$"+(v/1e12).toFixed(1)+"T";
  if (v>=1e9) return "$"+(v/1e9).toFixed(1)+"B";
  if (v>=1e6) return "$"+(v/1e6).toFixed(0)+"M";
  return "$"+Math.round(v);
}
function fmtPop(p){
  if (p>=1e9) return (p/1e9).toFixed(2)+"B";
  if (p>=1e6) return (p/1e6).toFixed(1)+"M";
  if (p>=1e3) return Math.round(p/1e3)+"K";
  return p;
}
function key(){ return sizeMode+"|"+layoutMode; }
function nodeOf(s){ return positions[key()][s.iso]; }
function tileColor(s){
  if (colorMode==="flat") return flatColor[s.iso];
  if (colorMode==="region") return regionColor(s.region);
  return pcColor(s);
}
function textColor(s){
  if (colorMode!=="pc") return "#14161c";
  return s.pc > 25000 ? "#f3f4f6" : "#14161c";
}

const leafG = g.selectAll("g.leaf").data(items, d=>d.iso).join("g")
  .attr("class","leaf")
  .on("mousemove",(ev,s)=>{
    tt.style.display="block";
    tt.style.left=Math.min(ev.clientX+14, window.innerWidth-350)+"px";
    tt.style.top=(ev.clientY+14)+"px";
    const yr = s.gdpYear==="2025"||s.gdpYear==="2024" ? s.gdpYear : `<span class="yr">${s.gdpYear}</span>`;
    tt.innerHTML = `<b>${s.name}</b><br>`
      + `<span class="k">gdp</span> ${fmtMoney(s.gdp)} (${s.gdpShare.toFixed(2)}% of world, ${yr})<br>`
      + `<span class="k">gdp per capita</span> ${fmtMoney(s.pc)}<br>`
      + `<span class="k">population</span> ${fmtPop(s.pop)} (${s.popShare.toFixed(2)}%)<br>`
      + `<span class="k">region</span> ${shortRegion(s.region)}<br>`
      + `<span class="k">source</span> World Bank`;
  })
  .on("mouseleave",()=>{ tt.style.display="none"; })
  .on("dblclick",(ev,s)=>{ ev.stopPropagation(); flyTo(nodeOf(s)); });

leafG.append("rect").attr("rx",2);
leafG.append("text").attr("class","t-name").text(d=>d.name);
leafG.append("text").attr("class","t-val");
leafG.append("text").attr("class","t-meta");

const regionG = g.append("g");

let k = 1;
function updateLabels(){
  zlevel.textContent = "zoom "+k.toFixed(1)+"x";
  leafG.each(function(s){
    const d = nodeOf(s);
    const w=(d.x1-d.x0)*k, h=(d.y1-d.y0)*k;
    const sel=d3.select(this);
    const label=s.name;
    let px = Math.min(26, Math.max(11, Math.sqrt(w*h)/7));
    const fits = w > label.length*px*0.56+12 && h > px*1.7;
    if (!fits){ px = Math.max(9,(w-10)/(label.length*0.58)); }
    const show = px>=9 && h>px*1.7 && w>34;
    const fs = px/k;
    const pad = 7/k;
    const tc = textColor(s);
    sel.select(".t-name").style("display",show?null:"none")
      .attr("x",pad).attr("y",pad+fs*0.9)
      .style("font-size",fs+"px").style("fill",tc)
      .style("font-weight", (sizeMode==="gdp"?s.gdpShare:s.popShare)>=1?"700":"500");
    const line2 = show && h > px*3.1;
    sel.select(".t-val").style("display",line2?null:"none")
      .attr("x",pad).attr("y",pad+fs*0.9+fs*1.2)
      .style("font-size",Math.max(8.5/k,fs*0.72)+"px").style("fill",tc)
      .text(sizeMode==="gdp" ? fmtMoney(s.gdp) : fmtPop(s.pop));
    const line3 = line2 && h > px*4.6 && w > 150;
    sel.select(".t-meta").style("display",line3?null:"none")
      .attr("x",pad).attr("y",pad+fs*0.9+fs*2.25)
      .style("font-size",Math.max(8/k,fs*0.58)+"px").style("fill",tc)
      .text(fmtMoney(s.pc)+" per capita");
  });
  leafG.select("rect").style("stroke-width",1.2/k).attr("rx",2/k);
  regionG.selectAll(".region-frame").style("stroke-width",2.5/k);
  regionG.selectAll(".region-label")
    .style("font-size",13/k+"px")
    .style("display", k<3.5 ? null : "none")
    .attr("x",d=>d.x0+8/k).attr("y",d=>d.y0+15/k);
}

function apply(){
  document.querySelectorAll("#sizeModes button").forEach(b=>b.classList.toggle("on",b.dataset.v===sizeMode));
  document.querySelectorAll("#colorModes button").forEach(b=>b.classList.toggle("on",b.dataset.v===colorMode));
  document.querySelectorAll("#layoutModes button").forEach(b=>b.classList.toggle("on",b.dataset.v===layoutMode));

  const t = svg.transition().duration(700).ease(d3.easeCubicInOut);
  leafG.transition(t).attr("transform", s=>{ const d=nodeOf(s); return `translate(${d.x0},${d.y0})`; });
  leafG.select("rect").transition(t)
    .attr("width", s=>{ const d=nodeOf(s); return Math.max(0,d.x1-d.x0); })
    .attr("height", s=>{ const d=nodeOf(s); return Math.max(0,d.y1-d.y0); })
    .attr("fill", tileColor);

  const regions = layoutMode==="grouped" ? layouts[key()].children : [];
  const rf = regionG.selectAll("g.rf").data(regions, d=>d.data.name);
  const rfE = rf.enter().append("g").attr("class","rf").style("opacity",0);
  rfE.append("rect").attr("class","region-frame");
  rfE.append("text").attr("class","region-label");
  const rfAll = rfE.merge(rf);
  rfAll.transition(t).style("opacity",1);
  rfAll.select(".region-frame").transition(t)
    .attr("x",d=>d.x0).attr("y",d=>d.y0)
    .attr("width",d=>d.x1-d.x0).attr("height",d=>d.y1-d.y0);
  rfAll.select(".region-label")
    .text(d=>{
      const share = sizeMode==="gdp" ? d.value/totalGdp*100 : d.value/totalPop*100;
      return shortRegion(d.data.name).toUpperCase()+" "+share.toFixed(1)+"%";
    })
    .transition(t).attr("x",d=>d.x0+8).attr("y",d=>d.y0+15);
  rf.exit().transition(t).style("opacity",0).remove();

  const lg = d3.select("#legend").html("");
  if (colorMode==="region"){
    const seen = new Set();
    items.forEach(s=>{
      const key2 = regionColor(s.region)+"|"+shortRegion(s.region);
      if (seen.has(key2)) return; seen.add(key2);
      const e = lg.append("div").attr("class","lg");
      e.append("span").attr("class","sw").style("background",regionColor(s.region));
      e.append("span").text(shortRegion(s.region));
    });
  } else if (colorMode==="pc"){
    lg.append("span").text("$234");
    const stops = d3.range(0,1.01,0.1).map(t2=>{
      const lv = Math.log10(pcExtent[0])+t2*(Math.log10(pcExtent[1])-Math.log10(pcExtent[0]));
      return pcScale(lv);
    });
    lg.append("div").attr("class","grad").style("background","linear-gradient(90deg,"+stops.join(",")+")");
    lg.append("span").text("$290K gdp per capita, log scale");
  }
  t.on("end.labels", updateLabels);
  updateLabels();
}

const zoom = d3.zoom()
  .scaleExtent([0.8, 300])
  .on("start",()=>stage.classList.add("grabbing"))
  .on("end",()=>stage.classList.remove("grabbing"))
  .on("zoom",(ev)=>{ g.attr("transform",ev.transform); k=ev.transform.k; updateLabels(); });
svg.call(zoom).on("dblclick.zoom",null);

function flyTo(d){
  const w=d.x1-d.x0, h=d.y1-d.y0;
  const scale = Math.min(280, 0.85/Math.max(w/W, h/H));
  const tx = W/2 - scale*(d.x0+w/2);
  const ty = H/2 - scale*(d.y0+h/2);
  svg.transition().duration(750).ease(d3.easeCubicInOut)
    .call(zoom.transform, d3.zoomIdentity.translate(tx,ty).scale(scale));
}
document.getElementById("reset").onclick = ()=>{
  svg.transition().duration(600).ease(d3.easeCubicInOut).call(zoom.transform, d3.zoomIdentity);
};
document.querySelectorAll("#sizeModes button").forEach(b=>b.onclick=()=>{sizeMode=b.dataset.v;apply();});
document.querySelectorAll("#colorModes button").forEach(b=>b.onclick=()=>{colorMode=b.dataset.v;apply();});
document.querySelectorAll("#layoutModes button").forEach(b=>b.onclick=()=>{layoutMode=b.dataset.v;apply();});

apply();
</script>
</body>
</html>
